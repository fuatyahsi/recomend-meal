name: fridge_chef
description: "Buzdolabındaki malzemelere göre yemek tarifi öneren uygulama / Recipe suggestion app based on your fridge ingredients"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: any
  provider: ^6.1.1
  shared_preferences: ^2.2.2
  google_fonts: ^6.1.0
  flutter_staggered_animations: ^1.1.1
  cached_network_image: ^3.3.1
  animations: ^2.0.11
  flutter_local_notifications: ^21.0.0
  timezone: ^0.11.0
  flutter_timezone: ^5.0.1

  # Firebase
  firebase_core: ^3.8.1
  firebase_auth: ^5.4.1
  cloud_firestore: ^5.6.1
  # firebase_storage: ^12.4.1  # Blaze plan gerektirir - sonra aktif edilebilir
  google_sign_in: ^6.2.2

  # Ads
  google_mobile_ads: ^5.3.0

  # Cloudinary image upload
  http: ^1.2.1

  # Image picking
  image_picker: ^1.1.2

  # UUID generation
  uuid: ^4.5.1

  # Connectivity
  connectivity_plus: ^6.1.1

  # Voice commands for hands-free cooking
  speech_to_text: ^7.0.0
  flutter_tts: ^4.2.0

  # Custom animations are used instead of Lottie for lighter bundle

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true

  assets:
    - assets/data/
    - assets/images/
    - assets/animations/
